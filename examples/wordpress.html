<!--
  WordPress / Elementor beágyazás
  ================================

  Tedd egy "Custom HTML" (Elementor: HTML widget) blokkba. A <script>-et elég
  EGYSZER betölteni az oldalon; a <div> annyiszor szerepelhet, ahány form kell.

  Csak két KÖTELEZŐ mező:
    data-tag       → az AC tag, amit a feliratkozó kap
    data-redirect  → köszönő oldal URL-je (csak engedélyezett domainre mutathat)
  Az API végpont be van égetve a widgetbe.
-->

<div
  data-lead-form
  data-tag="LM: MILYEN-VALLALKOZAST-INDITS"
  data-redirect="https://wpkurzus.hu/ingyenes/milyen-vallalkozast-indits/koszi/"
  data-form-title="Kérem az ingyenes anyagot!"
  data-cta="Feliratkozom"
  data-theme="dark"
></div>

<script
  src="https://cdn.jsdelivr.net/gh/vikingokft/wpkurzus-lead-form@2/dist/lead-form.min.js"
  crossorigin="anonymous"></script>
