<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lead form — statikus HTML példa</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f6fc; margin: 0; padding: 3rem 1rem; }
    .demo { max-width: 640px; margin: 0 auto; }
    h1 { color: #25273e; }
  </style>
</head>
<body>
  <div class="demo">
    <h1>Feliratkozó form — beágyazva</h1>

    <!--
      Csak két KÖTELEZŐ mező:
        data-tag       → melyik AC taget kapja a feliratkozó
        data-redirect  → köszönő oldal (csak engedélyezett domainre mutathat)
      Az API végpont be van égetve a widgetbe — nem kell megadni.
    -->
    <div
      data-lead-form
      data-tag="LM: MILYEN-VALLALKOZAST-INDITS"
      data-redirect="https://wpkurzus.hu/ingyenes/milyen-vallalkozast-indits/koszi/"
      data-form-title="Töltsd le ingyen!"
      data-cta="Letöltöm"
      data-theme="dark"
    ></div>
  </div>

  <!-- Helyi build teszteléshez: -->
  <script src="../dist/lead-form.min.js"></script>

  <!-- Élesben CDN-ről, verzióra pinnelve:
  <script src="https://cdn.jsdelivr.net/gh/vikingokft/wpkurzus-lead-form@2/dist/lead-form.min.js"
          crossorigin="anonymous"></script>
  -->
</body>
</html>
